<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九星気学・天性の性質 占い</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap');

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --deep-purple: #1a0a2e;
      --purple: #2d1b5e;
      --purple-mid: #3d2580;
      --star-white: #e8e0ff;
      --text-light: #d4c8f0;
      --accent-red: #c94c4c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif JP', 'Yu Mincho', serif;
      background: var(--deep-purple);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 星空背景 */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(0.8); }
      to   { opacity: 1;   transform: scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      margin-bottom: 2rem;
    }
    header .subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), #a07030);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.15em;
      line-height: 1.3;
    }
    header .tagline {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: rgba(212,200,240,0.6);
      letter-spacing: 0.2em;
    }

    /* 入力フォーム */
    .form-card {
      background: linear-gradient(135deg, rgba(45,27,94,0.8), rgba(26,10,46,0.9));
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(8px);
    }
    .form-card h2 {
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      color: var(--gold-light);
    }
    .field input, .field select {
      background: rgba(61,37,128,0.5);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.6rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--gold);
    }
    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8) sepia(1) hue-rotate(10deg);
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
    }

    .btn-divine {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      background: linear-gradient(135deg, #7a4f00, var(--gold), #a07030, var(--gold-light));
      background-size: 200% 200%;
      animation: shimmer 3s ease infinite;
      border: none;
      border-radius: 10px;
      color: #1a0a00;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-divine:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,168,76,0.5);
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 結果エリア */
    #result {
      display: none;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .result-header .name-display {
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-bottom: 0.3rem;
    }
    .result-header .date-display {
      font-size: 0.78rem;
      color: rgba(212,200,240,0.6);
    }

    /* セクションカード */
    .section-card {
      background: linear-gradient(135deg, rgba(45,27,94,0.75), rgba(26,10,46,0.85));
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(8px);
    }
    .section-card .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .section-title .icon { font-size: 1.1rem; }

    /* 九星表示 */
    .kyusei-display {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .star-emblem {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(201,168,76,0.6);
      box-shadow: 0 0 30px rgba(201,168,76,0.2), inset 0 0 20px rgba(0,0,0,0.3);
    }
    .star-emblem .star-kanji {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .star-emblem .star-name {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
      color: rgba(255,255,255,0.8);
    }
    .star-info h3 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
    .star-info .star-element {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-bottom: 0.6rem;
    }
    .star-info p {
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-light);
    }

    /* 特性グリッド */
    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }
    .trait-item {
      background: rgba(61,37,128,0.3);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }
    .trait-item .trait-label {
      font-size: 0.68rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      margin-bottom: 0.2rem;
    }
    .trait-item .trait-value {
      font-size: 0.85rem;
    }

    /* 天性の性質 */
    .tensei-display {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .tensei-number {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(201,168,76,0.5);
    }
    .tensei-number .num {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1;
    }
    .tensei-number .num-label {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.1em;
    }
    .tensei-info h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold-light);
      margin-bottom: 0.3rem;
    }
    .tensei-info .tensei-keyword {
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.2em;
      margin-bottom: 0.6rem;
    }
    .tensei-info p {
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-light);
    }

    /* 今日の運勢 */
    .today-fortune {
      display: grid;
      gap: 0.8rem;
    }
    .fortune-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(61,37,128,0.25);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 10px;
      padding: 0.7rem 1rem;
    }
    .fortune-row .f-label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      width: 72px;
      flex-shrink: 0;
    }
    .fortune-row .stars-bar {
      display: flex;
      gap: 3px;
      flex: 1;
    }
    .star-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
    }
    .star-dot.filled {
      background: var(--gold);
      box-shadow: 0 0 6px rgba(201,168,76,0.7);
    }
    .fortune-row .f-comment {
      font-size: 0.8rem;
      color: var(--text-light);
      flex: 2;
    }

    /* ラッキー */
    .lucky-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-top: 1.2rem;
    }
    .lucky-item {
      text-align: center;
      background: rgba(61,37,128,0.3);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      padding: 0.8rem 0.5rem;
    }
    .lucky-item .l-label {
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
    }
    .lucky-item .l-value {
      font-size: 1rem;
      font-weight: 700;
      color: white;
    }

    /* メッセージ */
    .oracle-message {
      background: linear-gradient(135deg, rgba(100,60,0,0.3), rgba(60,30,0,0.4));
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      line-height: 1.9;
      color: var(--gold-light);
      text-align: center;
      font-style: italic;
    }

    /* 適職・転職セクション */
    .career-section { display: grid; gap: 0.85rem; }
    .career-jobs {
      background: rgba(61,37,128,0.25);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .career-jobs .cj-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .career-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }
    .career-tag {
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .career-block {
      border-radius: 12px;
      padding: 1rem 1.2rem;
    }
    .career-block.strength {
      background: linear-gradient(135deg, rgba(20,50,30,0.4), rgba(10,35,15,0.5));
      border: 1px solid rgba(80,200,100,0.25);
    }
    .career-block.job-change {
      background: linear-gradient(135deg, rgba(40,30,70,0.4), rgba(25,15,55,0.5));
      border: 1px solid rgba(150,100,220,0.3);
    }
    .career-block .cb-header {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      margin-bottom: 0.55rem;
    }
    .career-block.strength  .cb-header { color: #80d890; }
    .career-block.job-change .cb-header { color: #b090e8; }
    .career-block .cb-text {
      font-size: 0.87rem;
      line-height: 1.85;
      color: var(--text-light);
    }

    /* 恋活・婚活セクション */
    .love-section {
      display: grid;
      gap: 0.85rem;
    }
    .love-block {
      border-radius: 12px;
      padding: 1rem 1.2rem;
    }
    .love-block.tendency {
      background: linear-gradient(135deg, rgba(90,20,60,0.35), rgba(60,10,40,0.45));
      border: 1px solid rgba(220,100,160,0.3);
    }
    .love-block.caution {
      background: linear-gradient(135deg, rgba(80,40,10,0.35), rgba(60,20,5,0.45));
      border: 1px solid rgba(220,150,60,0.3);
    }
    .love-block.mindset {
      background: linear-gradient(135deg, rgba(20,60,80,0.35), rgba(10,40,60,0.45));
      border: 1px solid rgba(80,180,220,0.3);
    }
    .love-block .lb-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      margin-bottom: 0.55rem;
    }
    .love-block.tendency .lb-header { color: #f0a0c0; }
    .love-block.caution  .lb-header { color: #f0c060; }
    .love-block.mindset  .lb-header { color: #80d0f0; }
    .love-block .lb-text {
      font-size: 0.87rem;
      line-height: 1.85;
      color: var(--text-light);
    }

    footer {
      text-align: left;
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: rgba(212,200,240,0.4);
      letter-spacing: 0.15em;
      line-height: 2;
    }

    /* ── 深層読み セクション ── */
    .deep-section-title {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 0.82rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .deep-section-title .sec-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.4);
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--gold-light);
    }
    .deep-grid {
      display: grid;
      gap: 0.7rem;
    }
    .deep-grid.cols2 { grid-template-columns: 1fr 1fr; }
    .deep-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
    .deep-item {
      background: rgba(61,37,128,0.25);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
    }
    .deep-item .d-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }
    .deep-item .d-value {
      font-size: 0.84rem;
      line-height: 1.75;
      color: var(--text-light);
    }
    .deep-item.highlight {
      border-color: rgba(201,168,76,0.4);
      background: rgba(100,65,0,0.2);
    }
    .deep-item.highlight .d-value {
      color: var(--gold-light);
    }
    .advice-box {
      background: linear-gradient(135deg, rgba(30,60,20,0.4), rgba(20,40,10,0.5));
      border: 1px solid rgba(80,180,80,0.3);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-top: 0.5rem;
    }
    .advice-box .adv-step {
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
      margin-bottom: 0.6rem;
    }
    .advice-box .adv-step:last-child { margin-bottom: 0; }
    .advice-box .adv-badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: #80e080;
      background: rgba(80,180,80,0.15);
      border: 1px solid rgba(80,180,80,0.3);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      margin-top: 0.1rem;
    }
    .advice-box .adv-text {
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-light);
    }
    .avoid-box {
      background: linear-gradient(135deg, rgba(60,20,20,0.4), rgba(40,10,10,0.5));
      border: 1px solid rgba(180,80,80,0.3);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-top: 0.5rem;
    }
    .avoid-box .adv-badge { color: #e08080; background: rgba(180,80,80,0.15); border-color: rgba(180,80,80,0.3); }
    .timing-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .timing-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px rgba(201,168,76,0.8);
      flex-shrink: 0;
    }
    .timing-dot.wait { background: rgba(201,168,76,0.3); box-shadow: none; }

    @media (max-width: 480px) {
      .kyusei-display, .tensei-display { flex-direction: column; }
      .traits-grid { grid-template-columns: 1fr; }
      .lucky-section { grid-template-columns: 1fr 1fr; }
      .compatibility-grid { grid-template-columns: repeat(3, 1fr); }
      .deep-grid.cols3 { grid-template-columns: 1fr 1fr; }
      .deep-grid.cols2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="starfield"></div>

<div class="container">
  <header>
    <h1>◈ あなたの<br>天命・性質は ◈</h1>
    <p class="tagline">生年月日から導く、あなたの宿命と今日の運勢</p>
  </header>

  <!-- 入力フォーム -->
  <div class="form-card">
    <h2>◇ 生年月日を入力してください ◇</h2>
    <div class="field-group">
      <div class="field">
        <label>お名前（任意）</label>
        <input type="text" id="name" placeholder="山田 太郎" maxlength="20">
      </div>
      <div class="field">
        <label>生年月日</label>
        <div class="date-row">
          <div>
            <select id="birthYear"></select>
          </div>
          <div>
            <select id="birthMonth"></select>
          </div>
          <div>
            <select id="birthDay"></select>
          </div>
        </div>
      </div>
      <div class="field">
        <label>性別（任意）</label>
        <select id="gender">
          <option value="">選択しない</option>
          <option value="male">男性</option>
          <option value="female">女性</option>
        </select>
      </div>
    </div>
    <button class="btn-divine" onclick="divinate()">占 う</button>
  </div>

  <!-- 結果 -->
  <div id="result">
    <div class="result-header">
      <div class="name-display" id="display-name"></div>
      <div class="date-display" id="display-date"></div>
    </div>

    <!-- 九星気学 -->
    <div class="section-card">
      <div class="section-title">
        <span class="icon">☆</span>
        <span>九 星 気 学　本命星</span>
      </div>
      <div class="kyusei-display">
        <div class="star-emblem" id="star-emblem">
          <div class="star-kanji" id="star-kanji"></div>
          <div class="star-name" id="star-name-short"></div>
        </div>
        <div class="star-info">
          <h3 id="star-fullname"></h3>
          <div class="star-element" id="star-element"></div>
          <p id="star-desc"></p>
        </div>
      </div>
      <div class="traits-grid" id="traits-grid"></div>
    </div>

    <!-- 天性の性質 -->
    <div class="section-card">
      <div class="section-title">
        <span class="icon">◎</span>
        <span>天 性 数</span>
      </div>
      <div class="tensei-display">
        <div class="tensei-number" id="tensei-emblem">
          <div class="num" id="tensei-num"></div>
          <div class="num-label">天性数</div>
        </div>
        <div class="tensei-info">
          <h3 id="tensei-type"></h3>
          <div class="tensei-keyword" id="tensei-keyword"></div>
          <p id="tensei-desc"></p>
        </div>
      </div>
    </div>

    <!-- 今日の運勢 -->
    <div class="section-card">
      <div class="section-title">
        <span class="icon">✦</span>
        <span id="today-title">今日の運勢</span>

// ─── 九星計算 ────────────────────────────────────────────────
function calcKyusei(year, month) {
  // 節分(2月4日頃)以前は前年扱いが基本。ここでは月で簡易判定
  let y = (month <= 1) ? year - 1 : year; // 1月は前年扱い
  let sum = y.toString().split('').reduce((a,b) => a + parseInt(b), 0);
  while(sum >= 10) sum = sum.toString().split('').reduce((a,b) => a + parseInt(b), 0);
  let n = 10 - sum;
  if(n <= 0) n += 9;
  if(n > 9)  n = n % 9 || 9;
  return n;
}

// ─── 天性数計算 ──────────────────────────────────────────────
function calcTensei(month, day) {
  let sum = (month + day);
  // マスターナンバーチェック
  if(sum === 11 || sum === 22 || sum === 33) return sum;
  while(sum >= 10) {
    sum = sum.toString().split('').reduce((a,b) => a + parseInt(b), 0);
    if(sum === 11 || sum === 22 || sum === 33) return sum;
  }
  return sum;
}

// ─── 疑似乱数（日付＋星番号ベース） ─────────────────────────
function seededRand(seed, max) {
  let x = Math.sin(seed * 9301 + 49297) * 233280;
  return Math.abs(Math.floor((x - Math.floor(x)) * max));
}

function getFortuneScore(category, seed) {
  const items = FORTUNE_COMMENTS[category];
  // 重み付き選択
  const weights = items.map(i => i[1]);
  const total = weights.reduce((a,b) => a+b, 0);
  let r = seededRand(seed, total);
  for(let i=0;i<items.length;i++){
    r -= items[i][1];
    if(r < 0) return {text: items[i][0], score: items[i][1]};
  }
  return {text: items[items.length-1][0], score: items[items.length-1][1]};
}

      <div class="lb-text">${lk.caution}</div>
    </div>
    <div class="love-block mindset">
      <div class="lb-header">✦ 上手くいく意識の持ち方</div>
      <div class="lb-text">${lk.mindset}</div>
    </div>
  `;
}

// ─── 星ドット生成 ─────────────────────────────────────────────
function starsBar(score, max=5) {
  let html = '';
  for(let i=1;i<=max;i++){
    html += `<div class="star-dot${i<=score?' filled':''}"></div>`;
  }
  return html;
}

// ─── メイン占い処理 ──────────────────────────────────────────
function divinate() {
  const name    = document.getElementById('name').value.trim();
  const year    = parseInt(document.getElementById('birthYear').value);
  const month   = parseInt(document.getElementById('birthMonth').value);
  const day     = parseInt(document.getElementById('birthDay').value);

  if(!year || !month || !day || isNaN(year)||isNaN(month)||isNaN(day)) {
    alert('生年月日を入力してください。'); return;
  }

  // ── 計算
  const kyuseiNum = calcKyusei(year, month);
  const tenseiNum = calcTensei(month, day);
  const today     = new Date();
  const seed      = kyuseiNum * 100 + tenseiNum + today.getDate() + today.getMonth();

  const ks = KYUSEI[kyuseiNum];
  const ts = TENSEI[tenseiNum] || TENSEI[9]; // fallback

  // ── ヘッダー
  document.getElementById('display-name').textContent =
    name ? `◈ ${name} 様の占い結果 ◈` : '◈ あなたの占い結果 ◈';
  document.getElementById('display-date').textContent =
    `${year}年${month}月${day}日生まれ　/ 占い日：${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

  // ── 九星
  const emblem = document.getElementById('star-emblem');
  emblem.style.background = `linear-gradient(135deg, ${ks.color[0]}, ${ks.color[1]})`;
  document.getElementById('star-kanji').textContent = ks.kanji;
  document.getElementById('star-name-short').textContent = ks.short;
  document.getElementById('star-fullname').textContent = ks.name;
  document.getElementById('star-element').textContent = ks.element;
  document.getElementById('star-desc').textContent = ks.desc;

  // traits
  const tg = document.getElementById('traits-grid');
  tg.innerHTML = '';
  Object.entries(ks.traits).forEach(([k,v]) => {
    tg.innerHTML += `<div class="trait-item"><div class="trait-label">${k}</div><div class="trait-value">${v}</div></div>`;
  });

  // ── 天性の性質
  const te = document.getElementById('tensei-emblem');
  te.style.background = `linear-gradient(135deg, ${ts.color[0]}, ${ts.color[1]})`;
  document.getElementById('tensei-num').textContent = tenseiNum;
  document.getElementById('tensei-type').textContent = ts.type;
  document.getElementById('tensei-keyword').textContent = ts.keyword;
  document.getElementById('tensei-desc').textContent = ts.desc;

  // ── 今日の運勢
  const todayTitle = document.getElementById('today-title');
  todayTitle.textContent = `${today.getMonth()+1}月${today.getDate()}日の運勢`;

  const cats = [
    {key:'overall', label:'総合運'},
    {key:'love',    label:'恋愛運'},
    {key:'work',    label:'仕事運'},
    {key:'money',   label:'金　運'},
    {key:'health',  label:'健康運'},
  ];
  const fortune = document.getElementById('today-fortune');
  fortune.innerHTML = '';
  cats.forEach((c, i) => {
    const f = getFortuneScore(c.key, seed + i * 37);
    fortune.innerHTML += `
      <div class="fortune-row">
        <span class="f-label">${c.label}</span>
        <div class="stars-bar">${starsBar(f.score)}</div>
        <span class="f-comment">${f.text}</span>
      </div>`;
  });

  // ── ラッキー
  const luckyColor = LUCKY_COLORS[seededRand(seed+1, LUCKY_COLORS.length)];
  const luckyItem  = LUCKY_ITEMS[seededRand(seed+2, LUCKY_ITEMS.length)];
  const luckyDir   = LUCKY_DIRS[seededRand(seed+3, LUCKY_DIRS.length)];
  const luckyNum   = seededRand(seed+4, 8) + 1;
  document.getElementById('lucky-section').innerHTML = `
    <div class="lucky-item"><div class="l-label">ラッキーカラー</div><div class="l-value">${luckyColor}</div></div>
    <div class="lucky-item"><div class="l-label">ラッキーアイテム</div><div class="l-value">${luckyItem}</div></div>
    <div class="lucky-item"><div class="l-label">ラッキーナンバー</div><div class="l-value">${luckyNum}</div></div>
    <div class="lucky-item"><div class="l-label">吉方位</div><div class="l-value">${luckyDir}</div></div>
    <div class="lucky-item"><div class="l-label">本命星</div><div class="l-value">${ks.kanji}</div></div>
    <div class="lucky-item"><div class="l-label">天性数</div><div class="l-value">${tenseiNum}</div></div>
  `;

  // ── 神託メッセージ
  document.getElementById('oracle-message').textContent =
    ORACLE_MSGS[seededRand(seed+5, ORACLE_MSGS.length)];

  // ── 深層10セクション
  renderDeepSections(ks);

  // ── 適職・転職
  renderCareer(ks);

  // ── 恋活・婚活
  renderLoveKatsu(ks);

  // ── 表示
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.scrollIntoView({behavior:'smooth', block:'start'});
}
</script>
